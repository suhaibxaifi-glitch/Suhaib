<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suhaib Trophies | Fast & Premium</title>
    <style>
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #050505; /* Pitch Black */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Fast Entrance Animation */
        @keyframes fastSlideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Golden Shimmer Effect for Headlines */
        @keyframes shimmer {
            0% { background-position: -200%; }
            100% { background-position: 200%; }
        }

        header {
            background-color: #000;
            border-bottom: 2px solid #d4af37;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 3px;
            /* Shimmer Effect */
            background: linear-gradient(90deg, #8a6d3b, #d4af37, #f9e076, #8a6d3b);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s infinite linear;
        }

        h2 { 
            color: #d4af37; 
            font-size: 28px; 
            margin-bottom: 30px;
            animation: fastSlideUp 0.4s ease-out; /* Fast Animation */
        }

        .section { padding: 50px 20px; text-align: center; }

        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            width: 260px;
            padding: 15px;
            /* Faster Transition (0.2s) */
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            animation: fastSlideUp 0.5s ease-out;
            cursor: pointer;
        }

        /* Popping Effect on Hover */
        .card:hover { 
            transform: scale(1.08) translateY(-10px); 
            border-color: #f9e076;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
        }

        .card img { width: 100%; border-radius: 8px; margin-bottom: 15px; }

        .btn {
            display: inline-block;
            background: #d4af37;
            color: #000;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn:hover { background: #f9e076; transform: scale(1.1); }

        /* --- Left Corner 3-Dot Menu --- */
        .menu-container {
            position: absolute;
            top: 18px;
            left: 15px;
        }

        .three-dots {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            transition: 0.2s;
        }

        .three-dots:hover { transform: rotate(90deg); } /* Fast Rotation on Hover */

        .three-dots span {
            width: 5px;
            height: 5px;
            background-color: #d4af37;
            border-radius: 50%;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            left: 0;
            top: 45px;
            background-color: #111;
            min-width: 150px;
            border: 1px solid #d4af37;
            border-radius: 4px;
            z-index: 1001;
            /* Dropdown reveal animation */
            animation: fastSlideUp 0.2s ease-out;
        }

        .dropdown-content a {
            color: #fff;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
        }

        .dropdown-content a:hover { background-color: #d4af37; color: #000; }
        .show { display: block !important; }

    </style>
</head>
<body>

<header>
    <div class="menu-container">
        <div class="three-dots" id="dotBtn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <div id="myDropdown" class="dropdown-content">
            <a href="#home">Home</a>
            <a href="#products">Collection</a>
            <a href="#contact">Contact</a>
        </div>
    </div>
    <h1>Suhaib Trophies</h1>
</header>

<div class="section" id="home">
    <h2 id="products">Wholesale Collection</h2>
    <div class="products">
        <div class="card">
            <img src="mypic1.jpg" alt="Trophy">
            <h3>Golden Cups</h3>
            <p>High-gloss finish, best for sports.</p>
        </div>
        <div class="card" style="animation-delay: 0.1s;">
            <img src="mypic2.jpg" alt="Award">
            <h3>Corporate</h3>
            <p>Elegant design for office events.</p>
        </div>
        <div class="card" style="animation-delay: 0.2s;">
            <img src="mypic3.jpg" alt="Medal">
            <h3>Medals</h3>
            <p>Custom engraving available.</p>
        </div>
